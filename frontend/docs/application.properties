# =======================================================================
# CONFIGURACIÓN DE BASE DE DATOS SPRING BOOT
# Copiar este contenido en: src/main/resources/application.properties
# =======================================================================

# URL de Conexión a MySQL (bd_aquicitobroaster)
spring.datasource.url=jdbc:mysql://localhost:3306/bd_aquicitobroaster?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true

# Credenciales de Acceso
spring.datasource.username=broster
spring.datasource.password=#$Broster$2026$#

# Driver de Conexión MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Configuración del Puerto del Servidor Backend (Opcional)
server.port=8080
