spring.application.name=broster

# Puerto de Spring Boot
server.port=8080

# Base de datos MySQL / XAMPP
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/bd_aquicitobroaster?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Lima
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# JWT
app.jwt.secret=broster-dev-secret-change-me-1234567890-abcdefghijklmnopqrstuv-XYZ1234567890-ABCDEF
app.jwt.issuer=broster-api
app.jwt.expiration-minutes=480

server.error.include-message=always