spring.application.name=broster
server.port=8080

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:broster;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

app.jwt.secret=${APP_JWT_SECRET:broster-dev-secret-change-me-1234567890-abcdefghijklmnopqrstuv-XYZ1234567890-ABCDEF}
app.jwt.issuer=${APP_JWT_ISSUER:broster-api}
app.jwt.expiration-minutes=${APP_JWT_EXPIRATION_MINUTES:480}

server.error.include-message=always
